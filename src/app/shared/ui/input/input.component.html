<div>
  <label class="mb-2 block text-sm font-medium text-slate-700">
    {{ label() }}

    @if (required()) {
      <span class="text-red-500">*</span>
    }
  </label>

  <input
    [formControl]="control()"
    [type]="type()"
    [readonly]="readonly()"
    [placeholder]="placeholder()"
    class="w-full rounded-xl border px-4 py-3 transition-all duration-300 outline-none"
    [class.border-red-400]="error()"
    [class.border-slate-300]="!error()"
    [class.focus:ring-4]="true"
    [class.focus:ring-blue-100]="true"
    [class.focus:border-blue-600]="true"
  />

  @if (error()) {
    <p class="mt-2 text-sm text-red-500">Invalid {{ label() }}</p>
  }
</div>
